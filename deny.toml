# Cargo-deny configuration for dependency security and license checking
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8
exceptions = [
    # Add specific license exceptions here if needed
]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Deny multiple versions of the same crate unless explicitly allowed
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# Certain crates we don't want multiple versions of
[[bans.deny]]
name = "syn"
deny-multiple-versions = true

[[bans.deny]]
name = "serde"
deny-multiple-versions = true

[sources]
# Allow only crates.io
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
github = []  # List allowed GitHub orgs here if using git dependencies
